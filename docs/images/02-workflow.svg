<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600">
  <defs>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="600" fill="#0f172a"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="18" font-weight="bold" fill="white">Quality Gate Workflow</text>
  <text x="550" y="55" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="12" fill="#64748b">From agent completion to approved or resubmitted</text>

  <!-- START: agent.run.finished -->
  <rect x="20" y="80" width="160" height="60" rx="8" fill="#1e3a5f"/>
  <rect x="20" y="80" width="160" height="60" rx="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <text x="100" y="103" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="12" font-weight="bold" fill="#60a5fa">AGENT RUN FINISHED</text>
  <text x="100" y="120" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="10" fill="#93c5fd">auto-triggers evaluation</text>

  <!-- Arrow to evaluate -->
  <line x1="180" y1="110" x2="220" y2="110" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- EVALUATE box -->
  <rect x="220" y="80" width="200" height="60" rx="8" fill="#14532d"/>
  <rect x="220" y="80" width="200" height="60" rx="8" fill="none" stroke="#22c55e" stroke-width="2"/>
  <text x="320" y="103" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="12" font-weight="bold" fill="#22c55e">QUALITY EVALUATION</text>
  <text x="320" y="120" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="10" fill="#86efac">3 built-in checks | score 0-10</text>

  <!-- Arrow down from evaluate -->
  <line x1="320" y1="140" x2="320" y2="180" stroke="#64748b" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- DIAMOND: score? -->
  <polygon points="320,185 410,230 320,275 230,230" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="320" y="225" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="12" font-weight="bold" fill="white">score?</text>
  <text x="320" y="238" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="9" fill="#94a3b8">0 to 10</text>

  <!-- Path: 7+ (up and right) -->
  <line x1="410" y1="225" x2="470" y2="225" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="440" y="215" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="11" font-weight="bold" fill="#22c55e">7+</text>

  <!-- SCORE 7+: Auto-pass (top right) -->
  <rect x="470" y="175" width="190" height="100" rx="8" fill="#14532d" opacity="0.8"/>
  <rect x="470" y="175" width="190" height="100" rx="8" fill="none" stroke="#22c55e" stroke-width="2"/>
  <text x="565" y="200" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="12" font-weight="bold" fill="#22c55e">SCORE 7+ AUTO-PASS</text>
  <text x="565" y="218" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="10" fill="#86efac">status: in_review</text>
  <text x="565" y="236" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="10" fill="#86efac">waiting for human reviewer</text>
  <text x="565" y="260" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="10" fill="#475569">score &gt;= minQualityScore (7)</text>

  <!-- Path: <3 (left from diamond) -->
  <line x1="230" y1="215" x2="170" y2="215" stroke="#ef4444" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="200" y="205" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="11" font-weight="bold" fill="#ef4444">&lt;3</text>

  <!-- AUTO-REJECTED (left) -->
  <rect x="20" y="165" width="150" height="100" rx="8" fill="#450a0a" opacity="0.8"/>
  <rect x="20" y="165" width="150" height="100" rx="8" fill="none" stroke="#ef4444" stroke-width="2"/>
  <text x="95" y="190" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="12" font-weight="bold" fill="#ef4444">AUTO-REJECTED</text>
  <text x="95" y="208" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="10" fill="#fca5a5">status: in_progress</text>
  <text x="95" y="226" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="10" fill="#fca5a5">score &lt; autoRejectBelow</text>
  <text x="95" y="250" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="9" fill="#7f1d1d">agent must fix + resubmit</text>

  <!-- Path: 3-6 (right from diamond, down to human gate) -->
  <line x1="320" y1="275" x2="320" y2="320" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-amber)"/>
  <text x="335" y="300" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="11" font-weight="bold" fill="#f59e0b">3-6</text>

  <!-- HUMAN GATE REQUIRED -->
  <rect x="220" y="320" width="200" height="80" rx="8" fill="#451a03" opacity="0.8"/>
  <rect x="220" y="320" width="200" height="80" rx="8" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="343" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="12" font-weight="bold" fill="#f59e0b">NEEDS HUMAN REVIEW</text>
  <text x="320" y="361" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="10" fill="#fcd34d">status: in_review | blocked</text>
  <text x="320" y="379" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="10" fill="#fcd34d">reviewer must approve or reject</text>
  <text x="320" y="392" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="9" fill="#78350f">blockThreshold &gt;= score &gt; autoRejectBelow</text>

  <!-- Arrow: human gate -> OK? -->
  <line x1="320" y1="400" x2="320" y2="430" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Human reviewer label -->
  <circle cx="320" cy="435" r="14" fill="#f59e0b" opacity="0.2"/>
  <circle cx="320" cy="435" r="14" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="439" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="11" font-weight="bold" fill="#f59e0b">H</text>

  <!-- OK? diamond -->
  <line x1="320" y1="449" x2="320" y2="470" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="320,475 410,520 320,565 230,520" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="518" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="11" font-weight="bold" fill="#f59e0b">REVIEWER</text>
  <text x="320" y="530" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="9" fill="#94a3b8">approve or reject?</text>

  <!-- APPROVED path -->
  <line x1="230" y1="520" x2="100" y2="520" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="165" y="510" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="11" font-weight="bold" fill="#22c55e">APPROVED</text>

  <!-- DONE -->
  <rect x="10" y="490" width="90" height="60" rx="8" fill="#14532d" opacity="0.8"/>
  <rect x="10" y="490" width="90" height="60" rx="8" fill="none" stroke="#22c55e" stroke-width="2"/>
  <text x="55" y="515" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="11" font-weight="bold" fill="#22c55e">DONE</text>
  <text x="55" y="531" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="9" fill="#86efac">issue: done</text>
  <text x="55" y="542" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="9" fill="#475569">deliverable approved</text>

  <!-- REJECTED path -->
  <line x1="410" y1="520" x2="560" y2="520" stroke="#ef4444" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="485" y="510" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="11" font-weight="bold" fill="#ef4444">REJECTED</text>

  <!-- IN PROGRESS -->
  <rect x="560" y="490" width="130" height="60" rx="8" fill="#450a0a" opacity="0.8"/>
  <rect x="560" y="490" width="130" height="60" rx="8" fill="none" stroke="#ef4444" stroke-width="2"/>
  <text x="625" y="515" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="11" font-weight="bold" fill="#ef4444">IN PROGRESS</text>
  <text x="625" y="531" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="9" fill="#fca5a5">issue: in_progress</text>
  <text x="625" y="542" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="9" fill="#7f1d1d">agent must fix + resubmit</text>

  <!-- Score 7+ also leads to reviewer approval (arrow from auto-pass to diamond) -->
  <line x1="565" y1="275" x2="565" y2="380" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="565" y1="380" x2="420" y2="520" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="585" y="330" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="9" fill="#64748b">also needs</text>
  <text x="585" y="342" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="9" fill="#64748b">human approval</text>

  <!-- Legend (bottom left) -->
  <rect x="20" y="530" width="180" height="60" rx="6" fill="#1e293b" opacity="0.6"/>
  <text x="30" y="548" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#94a3b8">CHECKS</text>
  <text x="30" y="563" font-family="Arial,sans-serif" font-size="9" fill="#64748b">1. score_threshold</text>
  <text x="30" y="576" font-family="Arial,sans-serif" font-size="9" fill="#64748b">2. no_blockers</text>
  <text x="30" y="589" font-family="Arial,sans-serif" font-size="9" fill="#64748b">3. auto_reject check + custom</text>

  <!-- auto_reject arrow back from auto-rejected to evaluate (resubmit loop) -->
  <line x1="95" y1="265" x2="95" y2="155" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="95" y1="155" x2="200" y2="125" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="200" y1="125" x2="220" y2="110" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arr-red)"/>
  <text x="80" y="200" font-family="Arial,sans-serif" font-size="8" fill="#7f1d1d" transform="rotate(-90,80,200)">resubmit</text>
</svg>