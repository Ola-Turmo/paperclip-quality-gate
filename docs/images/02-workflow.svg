<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640"><rect x="0" y="0" width="1200" height="640" rx="0" fill="#0d1b2a"/><rect x="0" y="0" width="1200" height="6" rx="0" fill="#00e5ff"/><text x="600" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="#00e5ff">Quality Gate  |  Review Lifecycle</text><text x="600" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#78909c">From agent completion to approved deliverable</text><rect x="20" y="112" width="210" height="100" rx="14" fill="#1565c0"/><text x="125" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white"><tspan x="125" dy="-26">AGENT RUN</tspan><tspan x="125" dy="26">FINISHED</tspan></text><text x="125" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#90caf9">auto-triggers evaluation</text><line x1="230" y1="162" x2="290" y2="162" stroke="#4fc3f7" stroke-width="2.5" stroke-dasharray="6,4"/><rect x="290" y="112" width="210" height="100" rx="14" fill="#00695c"/><text x="395" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white"><tspan x="395" dy="-26">QUALITY</tspan><tspan x="395" dy="26">EVALUATION</tspan></text><text x="395" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#80cbc4">8 checks  |  score 0-10</text><line x1="500" y1="162" x2="548" y2="162" stroke="#4fc3f7" stroke-width="2.5" stroke-dasharray="6,4"/><rect x="540" y="125" width="80" height="74" rx="40" fill="#263238"/><text x="580" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#ffcc02">score?</text><line x1="540" y1="125" x2="540" y2="60" stroke="#66bb6a" stroke-width="2.5" stroke-dasharray="6,4"/><text x="528" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#66bb6a">7+</text><rect x="580" y="22" width="260" height="98" rx="14" fill="#2e7d32"/><text x="710" y="54" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="white"><tspan x="710" dy="-24">SCORE 7+  AUTO-PASS</tspan><tspan x="710" dy="24">in_review  |  wait human</tspan></text><line x1="580" y1="162" x2="580" y2="230" stroke="#ef5350" stroke-width="2.5" stroke-dasharray="6,4"/><text x="566" y="199" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#ef5350">below 3</text><rect x="410" y="230" width="190" height="78" rx="14" fill="#c62828"/><text x="505" y="262" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white"><tspan x="505" dy="-22">AUTO REJECTED</tspan><tspan x="505" dy="22">score below 3</tspan></text><text x="505" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ef9a9a">agent must fix and resubmit</text><line x1="620" y1="162" x2="620" y2="230" stroke="#ffcc02" stroke-width="2.5" stroke-dasharray="6,4"/><text x="630" y="199" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#ffcc02">below 7</text><rect x="660" y="230" width="240" height="78" rx="14" fill="#e65100"/><text x="780" y="254" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white"><tspan x="780" dy="-22">HUMAN GATE REQUIRED</tspan><tspan x="780" dy="22">needs_human_review  |  blocked</tspan></text><text x="780" y="286" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ffcc02">pending_review  |  in_review</text><rect x="410" y="335" width="190" height="64" rx="14" fill="#f57f17"/><text x="505" y="358" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white"><tspan x="505" dy="-22">PENDING REVIEW</tspan><tspan x="505" dy="22">in_review status</tspan></text><line x1="600" y1="358" x2="660" y2="269" stroke="#f57f17" stroke-width="2.5" stroke-dasharray="6,4"/><line x1="780" y1="308" x2="780" y2="392" stroke="#ffcc02" stroke-width="2.5" stroke-dasharray="6,4"/><text x="792" y="354" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#ffcc02">approved?</text><rect x="730" y="392" width="100" height="74" rx="50" fill="#263238"/><text x="780" y="437" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#b0bec5">OK?</text><line x1="730" y1="392" x2="730" y2="508" stroke="#4caf50" stroke-width="2.5" stroke-dasharray="6,4"/><text x="716" y="456" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#4caf50">APPROVED</text><rect x="560" y="508" width="200" height="78" rx="14" fill="#1b5e20"/><text x="660" y="530" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white"><tspan x="660" dy="-26">DONE  [OK]</tspan><tspan x="660" dy="26">Issue -> done</tspan></text><text x="660" y="564" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#81c784">Deliverable approved</text><line x1="830" y1="392" x2="830" y2="508" stroke="#f44336" stroke-width="2.5" stroke-dasharray="6,4"/><text x="842" y="456" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#f44336">REJECTED</text><rect x="830" y="508" width="210" height="78" rx="14" fill="#b71c1c"/><text x="935" y="530" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="white"><tspan x="935" dy="-24">IN PROGRESS  [X]</tspan><tspan x="935" dy="24">Issue -> in_progress</tspan></text><text x="935" y="564" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ef9a9a">Agent must fix and resubmit</text></svg>