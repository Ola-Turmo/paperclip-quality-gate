<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630"><rect x="0" y="0" width="1200" height="630" rx="0" fill="#0d1b2a"/><rect x="0" y="0" width="1200" height="6" rx="0" fill="#00e5ff"/><text x="600" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="38" font-weight="bold" fill="#00e5ff">uos-quality-gate</text><text x="600" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#90a4ae">Universal Quality Gate for Paperclip</text><line x1="60" y1="130" x2="1140" y2="130" stroke="#1e3a5f" stroke-width="1"/><rect x="60" y="155" width="252" height="300" rx="16" fill="#00e5ff"/><text x="186" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="white"><tspan x="186" dy="-32">AGENT</tspan><tspan x="186" dy="32">INTERCEPTION</tspan></text><text x="186" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="rgba(255,255,255,0.75)"><tspan x="186" dy="-20">Auto-captures every</tspan><tspan x="186" dy="20">agent.run.finished event</tspan><tspan x="186" dy="20">across all UOS agents</tspan></text><rect x="336" y="155" width="252" height="300" rx="16" fill="#00bcd4"/><text x="462" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="white"><tspan x="462" dy="-32">SMART</tspan><tspan x="462" dy="32">EVALUATION</tspan></text><text x="462" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="rgba(255,255,255,0.75)"><tspan x="462" dy="-20">8 deterministic checks,</tspan><tspan x="462" dy="20">djb2 variance, calibrated</tspan><tspan x="462" dy="20">threshold scoring</tspan></text><rect x="612" y="155" width="252" height="300" rx="16" fill="#0097a7"/><text x="738" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="white"><tspan x="738" dy="-32">HUMAN</tspan><tspan x="738" dy="32">GATE</tspan></text><text x="738" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="rgba(255,255,255,0.75)"><tspan x="738" dy="-20">No deliverable passes</tspan><tspan x="738" dy="20">without human approval</tspan><tspan x="738" dy="20">below score 7</tspan></text><rect x="888" y="155" width="252" height="300" rx="16" fill="#006064"/><text x="1014" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="white"><tspan x="1014" dy="-32">PLUGIN</tspan><tspan x="1014" dy="32">PROTOCOL</tspan></text><text x="1014" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="normal" fill="rgba(255,255,255,0.75)"><tspan x="1014" dy="-20">quality_gate.* actions,</tspan><tspan x="1014" dy="20">data, events, streams —</tspan><tspan x="1014" dy="20">open integration API</tspan></text><rect x="0" y="485" width="1200" height="145" rx="0" fill="#071323"/><text x="600" y="510" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#546e7a">Built on the Paperclip Plugin SDK  ·  v1.0.0  ·  MIT License</text><text x="120" y="555" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="#00e5ff">20/20</text><text x="120" y="583" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#78909c">Smoke Tests</text><text x="320" y="555" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="#00e5ff">4</text><text x="320" y="583" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#78909c">Agent Tools</text><text x="520" y="555" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="#00e5ff">3</text><text x="520" y="583" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#78909c">Plugin Actions</text><text x="720" y="555" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="#00e5ff">5</text><text x="720" y="583" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#78909c">Stream Channels</text><text x="920" y="555" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="#00e5ff">8</text><text x="920" y="583" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#78909c">Quality Checks</text></svg>