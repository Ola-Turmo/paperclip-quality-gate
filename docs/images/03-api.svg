<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630"><rect x="0" y="0" width="1200" height="630" rx="0" fill="#0d1b2a"/><rect x="0" y="0" width="1200" height="6" rx="0" fill="#00e5ff"/><text x="600" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="#00e5ff">uos-quality-gate  |  Plugin API</text><text x="600" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#78909c">quality_gate.* actions  |  data  |  events  |  streams</text><rect x="20" y="108" width="280" height="380" rx="14" fill="#0d47a1"/><rect x="20" y="108" width="280" height="38" rx="14" fill="#00e5ff"/><text x="160" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#0d1b2a">ACTIONS</text><text x="160" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">quality_gate.submit</text><text x="160" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">issue_id  |  summary</text><text x="160" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">quality_score  |  comment</text><text x="160" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">quality_gate.approve</text><text x="160" y="258" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">issue_id  |  comment</text><text x="160" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">quality_gate.reject</text><text x="160" y="298" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">issue_id  |  comment (req)</text><rect x="313" y="108" width="280" height="380" rx="14" fill="#00695c"/><rect x="313" y="108" width="280" height="38" rx="14" fill="#00e5ff"/><text x="453" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#0d1b2a">DATA</text><text x="453" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">quality_gate.review</text><text x="453" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">Returns ReviewStatusData</text><text x="453" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">for one issue by id</text><text x="453" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">quality_gate.reviews</text><text x="453" y="258" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">All reviews for company</text><text x="453" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">quality_gate.config</text><text x="453" y="298" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">Current threshold settings</text><rect x="606" y="108" width="280" height="380" rx="14" fill="#1a237e"/><rect x="606" y="108" width="280" height="38" rx="14" fill="#00e5ff"/><text x="746" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#0d1b2a">EVENTS</text><text x="746" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">agent.run.finished</text><text x="746" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">Auto-triggers on</text><text x="746" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">every agent completion</text><text x="746" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">issue.created</text><text x="746" y="258" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">issue.updated</text><text x="746" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">issue.status changed</text><rect x="899" y="108" width="280" height="380" rx="14" fill="#37474f"/><rect x="899" y="108" width="280" height="38" rx="14" fill="#00e5ff"/><text x="1039" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#0d1b2a">STREAMS</text><text x="1039" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">quality_gate.review_created</text><text x="1039" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">quality_gate.review_updated</text><text x="1039" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">quality_gate.review_approved</text><text x="1039" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">quality_gate.review_rejected</text><text x="1039" y="258" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">quality_gate.threshold_breached</text><rect x="20" y="505" width="1160" height="115" rx="12" fill="#071323"/><text x="100" y="530" text-anchor="start" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#00e5ff">Integration example:</text><text x="100" y="554" text-anchor="start" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#a5d6a7">await ctx.actions.invoke("quality_gate.submit", { issue_id, quality_score: 7 })</text><text x="100" y="576" text-anchor="start" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#80cbc4">ctx.streams.on("quality_gate.review_approved", handler)  // subscribe from any plugin</text><text x="100" y="598" text-anchor="start" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffcc02">await ctx.data.get("quality_gate.review", { issue_id })  // query review status</text></svg>