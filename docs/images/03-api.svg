<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620">
  <defs>
    <linearGradient id="hdr-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="620" fill="#0f172a"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="18" font-weight="bold" fill="white">uos-quality-gate Plugin API</text>
  <text x="550" y="50" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="12" fill="#64748b">quality_gate.* actions | data | events | streams</text>

  <!-- Divider line -->
  <line x1="20" y1="65" x2="1080" y2="65" stroke="#1e293b" stroke-width="2"/>

  <!-- ============================================
       TOP ROW: ACTIONS (4) + DATA (3)
       ============================================ -->

  <!-- ACTIONS header -->
  <rect x="20" y="80" width="530" height="32" rx="4" fill="url(#hdr-grad)"/>
  <text x="35" y="100" font-family="Arial,sans-serif" font-size="13"
        font-weight="bold" fill="#60a5fa">ACTIONS</text>
  <text x="105" y="100" font-family="Arial,sans-serif" font-size="11"
        fill="#64748b">callable by any plugin or agent</text>

  <!-- ACTION cards: 3 per row, 2 rows -->
  <!-- Row 1 -->
  <!-- Card: submit -->
  <rect x="20" y="120" width="255" height="60" rx="6" fill="#1e293b"/>
  <rect x="20" y="120" width="255" height="60" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="20" y="120" width="4" height="60" rx="2" fill="#3b82f6"/>
  <text x="35" y="140" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">quality_gate.submit</text>
  <text x="35" y="155" font-family="Arial,sans-serif" font-size="10" fill="#64748b">issue_id, summary,</text>
  <text x="35" y="168" font-family="Arial,sans-serif" font-size="10" fill="#64748b">quality_score, block_approval</text>

  <!-- Card: approve -->
  <rect x="285" y="120" width="130" height="60" rx="6" fill="#1e293b"/>
  <rect x="285" y="120" width="130" height="60" rx="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="285" y="120" width="4" height="60" rx="2" fill="#22c55e"/>
  <text x="300" y="140" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#22c55e">quality_gate.approve</text>
  <text x="300" y="155" font-family="Arial,sans-serif" font-size="10" fill="#64748b">issue_id,</text>
  <text x="300" y="168" font-family="Arial,sans-serif" font-size="10" fill="#64748b">comment (optional)</text>

  <!-- Card: reject -->
  <rect x="425" y="120" width="125" height="60" rx="6" fill="#1e293b"/>
  <rect x="425" y="120" width="125" height="60" rx="6" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="425" y="120" width="4" height="60" rx="2" fill="#ef4444"/>
  <text x="440" y="140" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ef4444">quality_gate.reject</text>
  <text x="440" y="155" font-family="Arial,sans-serif" font-size="10" fill="#64748b">issue_id,</text>
  <text x="440" y="168" font-family="Arial,sans-serif" font-size="10" fill="#64748b">comment (required)</text>

  <!-- Row 2 -->
  <!-- Card: assign -->
  <rect x="20" y="190" width="180" height="60" rx="6" fill="#1e293b"/>
  <rect x="20" y="190" width="180" height="60" rx="6" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="20" y="190" width="4" height="60" rx="2" fill="#a78bfa"/>
  <text x="35" y="210" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">quality_gate.assign</text>
  <text x="35" y="225" font-family="Arial,sans-serif" font-size="10" fill="#64748b">issue_id,</text>
  <text x="35" y="238" font-family="Arial,sans-serif" font-size="10" fill="#64748b">assigned_to (required)</text>

  <!-- Card: bulk_approve -->
  <rect x="210" y="190" width="180" height="60" rx="6" fill="#1e293b"/>
  <rect x="210" y="190" width="180" height="60" rx="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="210" y="190" width="4" height="60" rx="2" fill="#22c55e"/>
  <text x="225" y="210" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#22c55e">quality_gate.bulk_approve</text>
  <text x="225" y="225" font-family="Arial,sans-serif" font-size="10" fill="#64748b">issue_ids[],</text>
  <text x="225" y="238" font-family="Arial,sans-serif" font-size="10" fill="#64748b">comment (optional)</text>

  <!-- Card: bulk_reject -->
  <rect x="400" y="190" width="150" height="60" rx="6" fill="#1e293b"/>
  <rect x="400" y="190" width="150" height="60" rx="6" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="400" y="190" width="4" height="60" rx="2" fill="#ef4444"/>
  <text x="415" y="210" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ef4444">quality_gate.bulk_reject</text>
  <text x="415" y="225" font-family="Arial,sans-serif" font-size="10" fill="#64748b">issue_ids[],</text>
  <text x="415" y="238" font-family="Arial,sans-serif" font-size="10" fill="#64748b">comment (required)</text>

  <!-- DATA header -->
  <rect x="565" y="80" width="515" height="32" rx="4" fill="url(#hdr-grad)"/>
  <text x="580" y="100" font-family="Arial,sans-serif" font-size="13"
        font-weight="bold" fill="#22c55e">DATA</text>
  <text x="625" y="100" font-family="Arial,sans-serif" font-size="11"
        fill="#64748b">queryable by any plugin or UI</text>

  <!-- DATA cards -->
  <!-- Card: review -->
  <rect x="565" y="120" width="250" height="60" rx="6" fill="#1e293b"/>
  <rect x="565" y="120" width="250" height="60" rx="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="565" y="120" width="4" height="60" rx="2" fill="#22c55e"/>
  <text x="580" y="140" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#22c55e">quality_gate.review</text>
  <text x="580" y="155" font-family="Arial,sans-serif" font-size="10" fill="#64748b">params: issueId</text>
  <text x="580" y="168" font-family="Arial,sans-serif" font-size="10" fill="#64748b">returns: ReviewStatusData</text>

  <!-- Card: reviews -->
  <rect x="825" y="120" width="255" height="60" rx="6" fill="#1e293b"/>
  <rect x="825" y="120" width="255" height="60" rx="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="825" y="120" width="4" height="60" rx="2" fill="#22c55e"/>
  <text x="840" y="140" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#22c55e">quality_gate.reviews</text>
  <text x="840" y="155" font-family="Arial,sans-serif" font-size="10" fill="#64748b">params: companyId</text>
  <text x="840" y="168" font-family="Arial,sans-serif" font-size="10" fill="#64748b">returns: ReviewsListData[]</text>

  <!-- Card: config -->
  <rect x="565" y="190" width="240" height="60" rx="6" fill="#1e293b"/>
  <rect x="565" y="190" width="240" height="60" rx="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="565" y="190" width="4" height="60" rx="2" fill="#22c55e"/>
  <text x="580" y="210" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#22c55e">quality_gate.config</text>
  <text x="580" y="225" font-family="Arial,sans-serif" font-size="10" fill="#64748b">params: none</text>
  <text x="580" y="238" font-family="Arial,sans-serif" font-size="10" fill="#64748b">returns: QualityGateSettings</text>

  <!-- Card: trends -->
  <rect x="815" y="190" width="265" height="60" rx="6" fill="#1e293b"/>
  <rect x="815" y="190" width="265" height="60" rx="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="815" y="190" width="4" height="60" rx="2" fill="#22c55e"/>
  <text x="830" y="210" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#22c55e">quality_gate.trends</text>
  <text x="830" y="225" font-family="Arial,sans-serif" font-size="10" fill="#64748b">params: companyId</text>
  <text x="830" y="238" font-family="Arial,sans-serif" font-size="10" fill="#64748b">returns: QualityTrendsData</text>

  <!-- ============================================
       BOTTOM ROW: EVENTS + STREAMS
       ============================================ -->

  <!-- EVENTS header -->
  <rect x="20" y="270" width="530" height="32" rx="4" fill="url(#hdr-grad)"/>
  <text x="35" y="290" font-family="Arial,sans-serif" font-size="13"
        font-weight="bold" fill="#f59e0b">EVENTS</text>
  <text x="100" y="290" font-family="Arial,sans-serif" font-size="11"
        fill="#64748b">subscribed (plugin listens)</text>

  <!-- EVENT cards -->
  <!-- Card: agent.run.finished -->
  <rect x="20" y="310" width="255" height="70" rx="6" fill="#1e293b"/>
  <rect x="20" y="310" width="255" height="70" rx="6" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="20" y="310" width="4" height="70" rx="2" fill="#f59e0b"/>
  <text x="35" y="330" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">agent.run.finished</text>
  <text x="35" y="345" font-family="Arial,sans-serif" font-size="10" fill="#64748b">Auto-triggers quality evaluation.</text>
  <text x="35" y="358" font-family="Arial,sans-serif" font-size="10" fill="#64748b">payload: agentId, status,</text>
  <text x="35" y="371" font-family="Arial,sans-serif" font-size="10" fill="#64748b">qualityScore, blockApproval</text>

  <!-- Card: agent.run.failed -->
  <rect x="285" y="310" width="130" height="70" rx="6" fill="#1e293b"/>
  <rect x="285" y="310" width="130" height="70" rx="6" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="285" y="310" width="4" height="70" rx="2" fill="#ef4444"/>
  <text x="300" y="330" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ef4444">agent.run.failed</text>
  <text x="300" y="345" font-family="Arial,sans-serif" font-size="10" fill="#64748b">Log and skip.</text>
  <text x="300" y="358" font-family="Arial,sans-serif" font-size="10" fill="#64748b">No deliverable</text>
  <text x="300" y="371" font-family="Arial,sans-serif" font-size="10" fill="#64748b">produced.</text>

  <!-- Card: issue.created -->
  <rect x="425" y="310" width="125" height="70" rx="6" fill="#1e293b"/>
  <rect x="425" y="310" width="125" height="70" rx="6" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <rect x="425" y="310" width="4" height="70" rx="2" fill="#64748b"/>
  <text x="440" y="330" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#94a3b8">issue.created</text>
  <text x="440" y="345" font-family="Arial,sans-serif" font-size="10" fill="#64748b">Observe and</text>
  <text x="440" y="358" font-family="Arial,sans-serif" font-size="10" fill="#64748b">log new issues.</text>
  <text x="440" y="371" font-family="Arial,sans-serif" font-size="10" fill="#64748b"></text>

  <!-- Row 2: issue.updated -->
  <rect x="20" y="390" width="255" height="50" rx="6" fill="#1e293b"/>
  <rect x="20" y="390" width="255" height="50" rx="6" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <rect x="20" y="390" width="4" height="50" rx="2" fill="#64748b"/>
  <text x="35" y="410" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#94a3b8">issue.updated</text>
  <text x="35" y="425" font-family="Arial,sans-serif" font-size="10" fill="#64748b">Log status changes for audit trail.</text>

  <!-- STREAMS header -->
  <rect x="565" y="270" width="515" height="32" rx="4" fill="url(#hdr-grad)"/>
  <text x="580" y="290" font-family="Arial,sans-serif" font-size="13"
        font-weight="bold" fill="#a78bfa">STREAMS</text>
  <text x="660" y="290" font-family="Arial,sans-serif" font-size="11"
        fill="#64748b">emitted (any plugin can subscribe)</text>

  <!-- STREAMS: 3 per row, 2 rows -->
  <!-- Row 1 -->
  <!-- review_created -->
  <rect x="565" y="310" width="240" height="50" rx="6" fill="#1e293b"/>
  <rect x="565" y="310" width="240" height="50" rx="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="565" y="310" width="4" height="50" rx="2" fill="#22c55e"/>
  <text x="580" y="330" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#22c55e">quality_gate.review_created</text>
  <text x="580" y="347" font-family="Arial,sans-serif" font-size="10" fill="#64748b">Emitted when a new review is created</text>

  <!-- review_updated -->
  <rect x="815" y="310" width="265" height="50" rx="6" fill="#1e293b"/>
  <rect x="815" y="310" width="265" height="50" rx="6" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="815" y="310" width="4" height="50" rx="2" fill="#3b82f6"/>
  <text x="830" y="330" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#60a5fa">quality_gate.review_updated</text>
  <text x="830" y="347" font-family="Arial,sans-serif" font-size="10" fill="#64748b">Emitted on every status change</text>

  <!-- Row 2 -->
  <!-- review_approved -->
  <rect x="565" y="370" width="170" height="50" rx="6" fill="#1e293b"/>
  <rect x="565" y="370" width="170" height="50" rx="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="565" y="370" width="4" height="50" rx="2" fill="#22c55e"/>
  <text x="580" y="390" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#22c55e">quality_gate.review_approved</text>
  <text x="580" y="407" font-family="Arial,sans-serif" font-size="10" fill="#64748b">Trigger downstream actions</text>

  <!-- review_rejected -->
  <rect x="745" y="370" width="170" height="50" rx="6" fill="#1e293b"/>
  <rect x="745" y="370" width="170" height="50" rx="6" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="745" y="370" width="4" height="50" rx="2" fill="#ef4444"/>
  <text x="760" y="390" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#ef4444">quality_gate.review_rejected</text>
  <text x="760" y="407" font-family="Arial,sans-serif" font-size="10" fill="#64748b">Trigger downstream actions</text>

  <!-- review_assigned -->
  <rect x="925" y="370" width="155" height="50" rx="6" fill="#1e293b"/>
  <rect x="925" y="370" width="155" height="50" rx="6" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="925" y="370" width="4" height="50" rx="2" fill="#a78bfa"/>
  <text x="940" y="390" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">quality_gate.review_assigned</text>
  <text x="940" y="407" font-family="Arial,sans-serif" font-size="10" fill="#64748b">On reviewer reassignment</text>

  <!-- Row 3 -->
  <!-- threshold_breached -->
  <rect x="565" y="430" width="515" height="50" rx="6" fill="#1e293b"/>
  <rect x="565" y="430" width="515" height="50" rx="6" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="565" y="430" width="4" height="50" rx="2" fill="#f59e0b"/>
  <text x="580" y="450" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">quality_gate.threshold_breached</text>
  <text x="820" y="450" font-family="Arial,sans-serif" font-size="10" fill="#64748b">Auto-reject or block-threshold triggered. payload: {review, score, reason}</text>

  <!-- Integration code example -->
  <rect x="20" y="490" width="1060" height="120" rx="6" fill="#0d1117"/>
  <rect x="20" y="490" width="1060" height="120" rx="6" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="35" y="512" font-family="Courier New,monospace" font-size="11" font-weight="bold" fill="#58a6ff">// Submit a deliverable for review</text>
  <text x="35" y="528" font-family="Courier New,monospace" font-size="10" fill="#c9d1d9">await ctx.actions.invoke("quality_gate.submit", {</text>
  <text x="55" y="542" font-family="Courier New,monospace" font-size="10" fill="#c9d1d9">issue_id: "iss_xxxx", quality_score: 7</text>
  <text x="35" y="556" font-family="Courier New,monospace" font-size="10" fill="#c9d1d9">});</text>
  <text x="380" y="512" font-family="Courier New,monospace" font-size="11" font-weight="bold" fill="#58a6ff">// Subscribe to approvals</text>
  <text x="380" y="528" font-family="Courier New,monospace" font-size="10" fill="#c9d1d9">ctx.streams.on("quality_gate.review_approved",</text>
  <text x="380" y="542" font-family="Courier New,monospace" font-size="10" fill="#c9d1d9">async ({ review }) =</text>
  <text x="380" y="556" font-family="Courier New,monospace" font-size="10" fill="#c9d1d9">ctx.logger.info("Approved:", review.issueId));</text>
  <text x="750" y="512" font-family="Courier New,monospace" font-size="11" font-weight="bold" fill="#58a6ff">// Query review status</text>
  <text x="750" y="528" font-family="Courier New,monospace" font-size="10" fill="#c9d1d9">const data = await ctx.data.get(</text>
  <text x="750" y="542" font-family="Courier New,monospace" font-size="10" fill="#c9d1d9">"quality_gate.review", { issueId });</text>
</svg>