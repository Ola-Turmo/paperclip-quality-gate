name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run plugin:typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run plugin:build

      - name: Verify build output
        run: |
          test -f dist/worker.js || exit 1
          test -f dist/manifest.js || exit 1
          test -f dist/ui/index.js || exit 1
