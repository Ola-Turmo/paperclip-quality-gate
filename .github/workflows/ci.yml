name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - run: bun install --frozen-lockfile

      - run: bun run plugin:format
        name: Format check (prettier)

      - run: bun run plugin:lint
        name: Lint (eslint)

      - run: bun run plugin:typecheck
        name: TypeScript type check

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - run: bun install --frozen-lockfile

      - run: bun test
        name: Tests (smoke + helpers)

      - run: bun run plugin:build
        name: Build
